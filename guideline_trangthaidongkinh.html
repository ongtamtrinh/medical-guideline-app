<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicalGuide - Phác đồ Trạng thái Động kinh</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        * { box-sizing: border-box; }
        /* Tùy chỉnh thanh cuộn cho sidebar */
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #8883; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /* ─── THEME ─── */
        const DARK={bg:"#0f1117",card:"#1a1d27",border:"#2a2d3e",text:"#e2e8f0",muted:"#94a3b8",accent:"#8b5cf6",danger:"#ef4444",warn:"#f59e0b",success:"#10b981",surface:"#141720",input:"#1e2130",teal:"#14b8a6"};
        const LIGHT={bg:"#f0f4f8",card:"#ffffff",border:"#e2e8f0",text:"#1e293b",muted:"#64748b",accent:"#7c3aed",danger:"#dc2626",warn:"#d97706",success:"#059669",surface:"#f8fafc",input:"#f1f5f9",teal:"#0d9488"};

        /* ─── DATA ─── */
        const REFS=[
          {id:1,authors:"Trinka E, Cock H, Hesdorffer D, et al.",year:2015,title:"A definition and classification of status epilepticus – Report of the ILAE Task Force on Classification of Status Epilepticus.",journal:"Epilepsia",vol:"56(10)",pages:"1515–1523",doi:"10.1111/epi.13121"},
          {id:2,authors:"Glauser T, Shinnar S, Gloss D, et al.",year:2016,title:"Evidence-Based Guideline: Treatment of Convulsive Status Epilepticus in Children and Adults.",journal:"Epilepsy Currents",vol:"16(1)",pages:"48–61",doi:"10.5698/1535-7597-16.1.48"},
          {id:3,authors:"Bộ Y tế Việt Nam",year:2020,title:"Hướng dẫn chẩn đoán và xử trí trạng thái động kinh.",journal:"Quyết định 3312/QĐ-BYT",vol:"",pages:"",doi:""},
          {id:4,authors:"Brophy GM, Bell R, Claassen J, et al.",year:2012,title:"Guidelines for the Evaluation and Management of Status Epilepticus.",journal:"Neurocrit Care",vol:"17(1)",pages:"3–23",doi:"10.1007/s12028-012-9695-z"},
          {id:5,authors:"Kapur J, Elm J, Chamberlain JM, et al. (RAMPART Study Group)",year:2019,title:"Randomized Trial of Three Anticonvulsant Medications for Status Epilepticus.",journal:"N Engl J Med",vol:"381(22)",pages:"2103–2113",doi:"10.1056/NEJMoa1905795"},
        ];

        const TIMELINE=[
          {phase:"Giai đoạn 0",timeRange:"0–5 phút",label:"Ổn định ban đầu",color:"#14b8a6",steps:[
            "Đặt bệnh nhân nằm nghiêng an toàn (tư thế hồi phục)",
            "Thông đường thở, Oxy mask 10L/phút",
            "SpO₂, Monitor tim mạch, Đường huyết mao mạch",
            "Thiết lập 2 đường truyền TM ngoại biên",
            "Xét nghiệm khẩn: CTM, BMP, Mg²⁺, Ca²⁺, Nồng độ AED nếu có",
          ]},
          {phase:"Giai đoạn 1",timeRange:"5–20 phút",label:"Điều trị cấp cứu — Benzodiazepine",color:"#8b5cf6",steps:[
            "Lorazepam 0.1 mg/kg IV (tối đa 4mg), có thể lặp lại 1 lần sau 5 phút",
            "Nếu không có đường IV: Midazolam 10mg IM (cân nặng ≥ 40kg)",
            "Diazepam 0.2 mg/kg IV (tối đa 10mg) — thay thế nếu không có Lorazepam",
            "Lấy máu cấy nếu nghi nhiễm trùng thần kinh TW",
          ]},
          {phase:"Giai đoạn 2",timeRange:"20–40 phút",label:"Điều trị lần 2 — AED tải liều",color:"#f59e0b",steps:[
            "Levetiracetam 60 mg/kg IV (tối đa 4.500mg) — 15 phút",
            "HOẶC Fosphenytoin 20 mg PE/kg IV (tối đa 1.500mg PE) — ≤ 150 mg PE/phút",
            "HOẶC Valproate 40 mg/kg IV (tối đa 3.000mg) — 10 phút",
            "MRI não (nếu ổn định huyết động) hoặc CT não khẩn",
            "Chọc dịch não tủy nếu nghi viêm màng não/viêm não",
          ]},
          {phase:"Giai đoạn 3",timeRange:"> 40 phút",label:"Động kinh kháng trị — Gây mê toàn thân",color:"#ef4444",steps:[
            "Chuyển ICU ngay lập tức, Hội chẩn Thần kinh + Hồi sức",
            "Midazolam 0.2 mg/kg bolus IV → duy trì 0.05–2 mg/kg/giờ",
            "HOẶC Propofol 1–2 mg/kg bolus → duy trì 1–15 mg/kg/giờ",
            "HOẶC Thiopental (nếu thất bại với các thuốc trên)",
            "EEG liên tục để hướng dẫn titrate thuốc (mục tiêu: burst-suppression)",
            "Đặt NKQ, thở máy kiểm soát",
          ]},
        ];

        const SECTIONS=[
          {id:"diag",title:"1. Định nghĩa & Phân loại"},
          {id:"redflag",title:"2. Dấu hiệu nguy hiểm"},
          {id:"timer",title:"3. Đồng hồ xử trí"},
          {id:"timeline",title:"4. Phác đồ theo thời gian"},
          {id:"dose",title:"5. Tính liều thuốc"},
          {id:"nursing",title:"6. Hướng dẫn điều dưỡng"},
          {id:"refs",title:"7. Tài liệu tham khảo"},
        ];

        /* ─── COMPONENTS ─── */
        function Badge({color,children}){
          return <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:600}}>{children}</span>;
        }

        function Toggle({value,onChange,c}){
          return(
            <div onClick={()=>onChange(!value)} style={{width:38,height:20,borderRadius:99,background:value?c.success:c.border,cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
              <div style={{position:"absolute",top:2,left:value?20:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
            </div>
          );
        }

        function DoseCalc({c}){
          const[weight,setWeight]=useState(60);
          const drugs=[
            {name:"Lorazepam",dose:0.1,max:4,unit:"mg IV",note:"Lặp lại 1 lần sau 5 phút nếu cần"},
            {name:"Midazolam IM",dose:0.2,max:10,unit:"mg IM",note:"Dùng khi không có đường IV"},
            {name:"Diazepam",dose:0.2,max:10,unit:"mg IV",note:"Tốc độ ≤ 5mg/phút"},
            {name:"Levetiracetam",dose:60,max:4500,unit:"mg IV",note:"Pha trong 100ml NaCl 0.9%, truyền 15 phút"},
            {name:"Fosphenytoin",dose:20,max:1500,unit:"mg PE IV",note:"≤ 150 mg PE/phút, monitor ECG"},
            {name:"Valproate",dose:40,max:3000,unit:"mg IV",note:"Truyền trong 10 phút, chống chỉ định thai kỳ"},
            {name:"Midazolam (duy trì ICU)",dose:0.05,max:2,unit:"mg/kg/giờ",note:"Titrate theo EEG"},
          ];
          return(
            <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:9,padding:14,margin:"14px 0"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <div style={{fontWeight:700,color:c.text,fontSize:13}}>🧮 Tính liều theo cân nặng</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
                  <label style={{color:c.muted,fontSize:12}}>Cân nặng:</label>
                  <input type="number" value={weight} min={1} max={200} onChange={e=>setWeight(+e.target.value)}
                    style={{width:60,padding:"3px 8px",borderRadius:5,border:`1px solid ${c.border}`,background:c.input,color:c.text,fontSize:13,textAlign:"center"}}/>
                  <span style={{color:c.muted,fontSize:12}}>kg</span>
                </div>
              </div>
              {drugs.map(d=>{
                const raw=d.dose*weight;
                const dose=Math.min(raw,d.max);
                const capped=raw>d.max;
                const isPerHour=d.unit.includes("giờ");
                return(
                  <div key={d.name} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:7,padding:"7px 10px",background:c.card,borderRadius:7,border:`0.5px solid ${c.border}`}}>
                    <span style={{color:c.accent,fontWeight:700,fontSize:12,minWidth:160}}>{d.name}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{color:c.text,fontWeight:700,fontSize:14}}>{isPerHour?`${d.dose}–${d.max}`:`${dose.toFixed(isPerHour?2:0)}`}</span>
                        <span style={{color:c.muted,fontSize:12}}>{d.unit}</span>
                        {capped&&<Badge color={c.warn}>Tối đa {d.max}{d.unit.split(" ")[0]}</Badge>}
                      </div>
                      <div style={{color:c.muted,fontSize:11,marginTop:2}}>{d.note}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        }

        function Timer({c}){
          const[running,setRunning]=useState(false);
          const[seconds,setSeconds]=useState(0);
          const ref=useRef(null);
          useEffect(()=>{
            if(running){ref.current=setInterval(()=>setSeconds(s=>s+1),1000);}
            else clearInterval(ref.current);
            return()=>clearInterval(ref.current);
          },[running]);
          const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
          const phase=seconds<300?"Giai đoạn 0 — Ổn định":seconds<1200?"Giai đoạn 1 — Benzodiazepine":seconds<2400?"Giai đoạn 2 — AED tải liều":"⚠️ Giai đoạn 3 — Gây mê khẩn";
          const phaseColor=seconds<300?c.teal:seconds<1200?c.accent:seconds<2400?c.warn:c.danger;
          return(
            <div style={{background:c.card,border:`2px solid ${phaseColor}`,borderRadius:10,padding:14,marginBottom:14}}>
              <div style={{fontWeight:700,color:c.text,fontSize:13,marginBottom:8}}>⏱️ Đồng hồ Xử trí Động kinh</div>
              <div style={{fontSize:42,fontWeight:700,color:phaseColor,textAlign:"center",fontVariantNumeric:"tabular-nums",letterSpacing:2}}>{fmt(seconds)}</div>
              <div style={{textAlign:"center",color:phaseColor,fontWeight:600,fontSize:13,marginTop:4}}>{phase}</div>
              <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center"}}>
                <button onClick={()=>setRunning(!running)} style={{padding:"8px 20px",background:running?c.warn:c.success,color:"#fff",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:13, transition:"0.2s"}}>
                  {running?"⏸ Dừng":"▶ Bắt đầu"}
                </button>
                <button onClick={()=>{setRunning(false);setSeconds(0);}} style={{padding:"8px 16px",background:c.surface,color:c.text,border:`1px solid ${c.border}`,borderRadius:7,fontWeight:600,cursor:"pointer",fontSize:13}}>
                  ↺ Reset
                </button>
              </div>
            </div>
          );
        }

        /* ─── MAIN APP ─── */
        function DongKinhGuideline(){
          const[dark,setDark]=useState(true);
          const c=dark?DARK:LIGHT;
          const[nursing,setNursing]=useState(false);
          const[active,setActive]=useState("diag");
          const[sidebar,setSidebar]=useState(true);
          
          const scrollTo=id=>{
            setActive(id);
            const el = document.getElementById(id);
            if (el) {
                const offset = 60;
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = el.getBoundingClientRect().top;
                const elementPosition = elementRect - bodyRect;
                const offsetPosition = elementPosition - offset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            }
          };

          return(
            <div style={{minHeight:"100vh",background:c.bg,color:c.text,fontFamily:"system-ui,sans-serif",fontSize:14}}>
              {/* Topbar */}
              <div style={{background:c.card,borderBottom:`1px solid ${c.border}`,padding:"10px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>setSidebar(!sidebar)} style={{background:"none",border:"none",color:c.muted,cursor:"pointer",fontSize:18}}>☰</button>
                <span style={{fontWeight:700,color:c.accent,fontSize:15}}>🏥 ClinicalGuide</span>
                <span style={{color:c.border}}>|</span>
                <span style={{fontWeight:600,color:c.text,fontSize:13,flex:1}}>Trạng thái Động kinh (Status Epilepticus)</span>
                <Badge color={c.accent}>v2.0</Badge>
                <Badge color={c.teal}>Thần kinh / ICU</Badge>
                <Badge color={c.danger}>ICD-10: G41.9</Badge>
                <div style={{display:"flex",alignItems:"center",gap:6, marginLeft:"10px"}}>
                  <span style={{fontSize:11,color:c.muted}}>Điều dưỡng</span>
                  <Toggle value={nursing} onChange={setNursing} c={c}/>
                </div>
                <button onClick={()=>setDark(!dark)} style={{background:c.surface,border:`1px solid ${c.border}`,color:c.text,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12, marginLeft:"8px"}}>
                  {dark?"☀️ Sáng":"🌙 Tối"}
                </button>
              </div>

              <div style={{display:"flex",maxWidth:1100,margin:"0 auto"}}>
                {/* Sidebar */}
                {sidebar&&(
                  <div className="sidebar-scroll" style={{width:210,minWidth:210,position:"sticky",top:49,height:"calc(100vh - 49px)",overflowY:"auto",background:c.card,borderRight:`1px solid ${c.border}`,padding:"14px 10px",boxSizing:"border-box"}}>
                    <div style={{fontSize:11,color:c.muted,fontWeight:700,letterSpacing:1,marginBottom:10}}>MỤC LỤC</div>
                    {SECTIONS.map(s=>(
                      <button key={s.id} onClick={()=>scrollTo(s.id)} style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",marginBottom:2,background:active===s.id?c.accent+"22":"transparent",border:"none",borderRadius:6,cursor:"pointer",color:active===s.id?c.accent:c.muted,fontSize:12,fontWeight:active===s.id?600:400,borderLeft:`3px solid ${active===s.id?c.accent:"transparent"}`}}>
                        {s.title}
                      </button>
                    ))}
                  </div>
                )}

                {/* Content */}
                <div style={{flex:1,padding:"16px 20px",boxSizing:"border-box",overflowX:"hidden"}}>
                  {/* Header */}
                  <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:14}}>
                    <h1 style={{margin:"0 0 6px",fontSize:20,fontWeight:700,color:c.text}}>Phác đồ Xử trí Trạng thái Động kinh (Status Epilepticus)</h1>
                    <div style={{color:c.muted,fontSize:12,marginBottom:8}}>Tác giả: PGS. Nguyễn Đình Toàn • ThS. Trần Minh Khoa • Cập nhật: 2024-10-01</div>
                    <div style={{fontSize:12,color:c.muted,fontStyle:"italic"}}>Dựa trên hướng dẫn ILAE 2015 [1], AES 2016 [2], Neurocrit Care 2012 [4] và Quyết định 3312/QĐ-BYT 2020 [3]</div>
                  </div>

                  {/* Section 1 — Định nghĩa */}
                  <div id="diag" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 10px"}}>1. Định nghĩa & Phân loại</h2>
                    <div style={{background:c.accent+"12",border:`1.5px solid ${c.accent}44`,borderRadius:8,padding:12,marginBottom:12}}>
                      <div style={{fontWeight:700,color:c.accent,fontSize:13,marginBottom:4}}>Định nghĩa (ILAE 2015) [1]</div>
                      <p style={{color:c.muted,fontSize:13,lineHeight:1.7,margin:0}}>
                        Trạng thái động kinh là tình trạng co giật <b style={{color:c.text}}>kéo dài ≥ 5 phút</b> hoặc <b style={{color:c.text}}>tái phát ≥ 2 lần</b> trong vòng 5 phút mà bệnh nhân không phục hồi ý thức giữa các cơn. Đây là <b style={{color:c.danger}}>tình trạng cấp cứu thần kinh</b> đe dọa tính mạng.
                      </p>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(240px, 1fr))",gap:10}}>
                      {[
                        {type:"Co giật toàn thể (GCSE)",note:"Co cứng–co giật toàn thân, mất ý thức — Nguy hiểm nhất, ưu tiên xử trí",color:c.danger},
                        {type:"Vắng ý thức (Absence SE)",note:"Lú lẫn kéo dài, không co giật rõ ràng — Cần EEG để chẩn đoán",color:c.warn},
                        {type:"Cơn cục bộ không rối loạn ý thức",note:"Giật cục bộ một chi, ý thức còn — Ít đe dọa tính mạng",color:c.accent},
                        {type:"Kháng trị (RSE)",note:"Không đáp ứng sau 2 thuốc — Cần gây mê, EEG liên tục",color:c.danger},
                      ].map((t,i)=>(
                        <div key={i} style={{background:t.color+"10",border:`1px solid ${t.color}33`,borderRadius:8,padding:10}}>
                          <div style={{fontWeight:700,color:t.color,fontSize:12,marginBottom:4}}>{t.type}</div>
                          <div style={{color:c.muted,fontSize:11,lineHeight:1.5}}>{t.note}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Section 2 — Red Flags */}
                  <div id="redflag" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 10px"}}>2. Dấu hiệu nguy hiểm & Chống chỉ định</h2>
                    <div style={{background:c.danger+"15",border:`2px solid ${c.danger}`,borderRadius:10,padding:14,marginBottom:10}}>
                      <div style={{color:c.danger,fontWeight:700,fontSize:14,marginBottom:8}}>⚠️ DẤU HIỆU BÁO ĐỘNG — XỬ TRÍ SONG SONG</div>
                      {[
                        "SpO₂ < 90% — Thông đường thở ngay, cân nhắc đặt NKQ",
                        "Tụt huyết áp — Bolus dịch, kiểm tra nguyên nhân (sepsis, xuất huyết)",
                        "Đường huyết < 60 mg/dL — Tiêm Glucose 50% 50ml IV ngay",
                        "Sốt cao > 39°C — Nghi viêm màng não, lấy CSF trước kháng sinh",
                        "Co giật kéo dài > 30 phút — Tổn thương não không hồi phục",
                      ].map((f,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:5}}><span style={{color:c.danger,fontWeight:700}}>!</span><span style={{color:c.text,fontSize:13}}>{f}</span></div>)}
                    </div>
                    <div style={{background:c.warn+"15",border:`1.5px solid ${c.warn}`,borderRadius:9,padding:12}}>
                      <div style={{color:c.warn,fontWeight:700,fontSize:13,marginBottom:6}}>🚫 Chống chỉ định & Thận trọng</div>
                      {[
                        "Fosphenytoin: Chống chỉ định blốc nhĩ-thất độ 2–3, bradycardia nặng",
                        "Valproate: Chống chỉ định phụ nữ có thai, suy gan nặng, Bệnh Urea Cycle",
                        "Propofol: Không dùng kéo dài ở trẻ em (hội chứng Propofol Infusion)",
                        "Phenytoin tĩnh mạch trực tiếp: Có thể gây hoại tử mô — Dùng Fosphenytoin thay thế",
                      ].map((f,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:5}}><span style={{color:c.warn,fontWeight:700}}>✕</span><span style={{color:c.text,fontSize:13}}>{f}</span></div>)}
                    </div>
                  </div>

                  {/* Section 3 — Timer */}
                  <div id="timer" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 12px"}}>3. Đồng hồ Xử trí Thời gian thực</h2>
                    <Timer c={c}/>
                    <div style={{fontSize:11,color:c.muted,textAlign:"center"}}>Bấm "Bắt đầu" ngay khi bệnh nhân vào viện đang co giật. Đồng hồ sẽ hiển thị giai đoạn điều trị tương ứng.</div>
                  </div>

                  {/* Section 4 — Timeline */}
                  <div id="timeline" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 12px"}}>4. Phác đồ theo thời gian (Time-based Protocol)</h2>
                    {TIMELINE.map((phase,pi)=>(
                      <div key={pi} style={{marginBottom:16}}>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                          <div style={{padding:"4px 14px",background:phase.color+"20",border:`2px solid ${phase.color}`,borderRadius:99,fontWeight:700,color:phase.color,fontSize:12,whiteSpace:"nowrap"}}>{phase.phase}</div>
                          <div style={{fontWeight:600,color:c.text,fontSize:13}}>{phase.label}</div>
                          <Badge color={phase.color}>{phase.timeRange}</Badge>
                        </div>
                        <div style={{borderLeft:`3px solid ${phase.color}44`,marginLeft:16,paddingLeft:14}}>
                          {phase.steps.map((s,si)=>(
                            <div key={si} style={{display:"flex",gap:8,marginBottom:7,alignItems:"flex-start"}}>
                              <div style={{width:20,height:20,borderRadius:"50%",background:phase.color+"22",border:`1.5px solid ${phase.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:phase.color,flexShrink:0,marginTop:1}}>{si+1}</div>
                              <span style={{color:c.text,fontSize:13,lineHeight:1.55}}>{s}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Section 5 — Dose */}
                  <div id="dose" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 4px"}}>5. Tính liều thuốc theo cân nặng</h2>
                    <DoseCalc c={c}/>
                  </div>

                  {/* Section 6 — Nursing */}
                  {nursing&&(
                    <div id="nursing" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                      <h2 style={{fontSize:15,fontWeight:700,color:c.success,margin:"0 0 12px"}}>🩺 6. Hướng dẫn Điều dưỡng</h2>
                      {[
                        {title:"Lorazepam IV",info:"Không pha loãng. Tiêm IV chậm ≤ 2mg/phút. Bảo quản lạnh 2–8°C. Theo dõi ức chế hô hấp.",warn:true},
                        {title:"Midazolam IM",info:"Tiêm vào cơ delta hoặc đùi trước. Không tiêm vào mạch máu. Hiệu quả nhanh trong 5 phút.",warn:false},
                        {title:"Levetiracetam IV",info:"Pha 60mg/kg (tối đa 4.500mg) trong 100ml NaCl 0.9%. Truyền trong 15 phút. Không cần monitor ECG.",warn:false},
                        {title:"Fosphenytoin IV",info:"Pha trong NaCl 0.9% hoặc Glucose 5%. Tốc độ ≤ 150 mg PE/phút. Monitor ECG và HA liên tục khi truyền.",warn:true},
                      ].map(d=>(
                        <div key={d.title} style={{marginBottom:10,padding:"10px 14px",background:d.warn?c.warn+"10":c.success+"10",border:`1px solid ${d.warn?c.warn:c.success}33`,borderRadius:8}}>
                          <div style={{fontWeight:700,color:c.text,fontSize:13,marginBottom:4}}>{d.title} {d.warn&&<Badge color={c.warn}>Monitor chặt</Badge>}</div>
                          <div style={{fontSize:12,color:c.muted}}>{d.info}</div>
                        </div>
                      ))}
                      <div style={{padding:"12px 14px",background:c.danger+"10",border:`1.5px solid ${c.danger}33`,borderRadius:8,marginTop:4}}>
                        <div style={{fontWeight:600,color:c.danger,fontSize:13,marginBottom:6}}>🚨 Theo dõi điều dưỡng liên tục trong SE</div>
                        {["SpO₂, Nhịp thở mỗi 5 phút — Chuẩn bị bóp bóng Ambu sẵn sàng","ECG liên tục khi dùng Fosphenytoin/Phenytoin","Đường huyết mao mạch mỗi 30 phút","Ghi nhận thời điểm ngừng co giật, tỉnh táo trở lại","Nhập chính xác lượng dịch, thuốc vào phiếu theo dõi ICU"].map((t,i)=>(
                          <div key={i} style={{display:"flex",gap:6,marginBottom:4}}>
                            <span style={{color:c.danger}}>•</span>
                            <span style={{color:c.muted,fontSize:12}}>{t}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Section 7 — References */}
                  <div id="refs" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 12px"}}>7. Tài liệu tham khảo</h2>
                    {REFS.map(r=>(
                      <div key={r.id} style={{display:"flex",gap:10,marginBottom:12,paddingBottom:12,borderBottom:`0.5px solid ${c.border}`}}>
                        <span style={{color:c.accent,fontWeight:700,fontSize:13,minWidth:20}}>[{r.id}]</span>
                        <div>
                          <div style={{fontSize:12.5,color:c.text,lineHeight:1.6}}>
                            {r.authors} ({r.year}). <i>{r.title}</i> <span style={{color:c.muted}}>{r.journal}{r.vol?`, ${r.vol}`:""}. {r.pages}</span>
                          </div>
                          {r.doi&&<div style={{fontSize:11,color:c.accent,marginTop:2, wordBreak:"break-all"}}>DOI: {r.doi}</div>}
                        </div>
                      </div>
                    ))}
                    <div style={{marginTop:8,padding:"8px 12px",background:c.surface,borderRadius:7,fontSize:11,color:c.muted}}>
                      Phác đồ này được xây dựng dựa trên bằng chứng y văn cập nhật đến tháng 10/2024.
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DongKinhGuideline />);
    </script>
</body>
</html>
