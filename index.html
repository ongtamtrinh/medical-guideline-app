<!DOCTYPE html>
<html lang="vi" class="light">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PhácĐồ MD - Mở rộng</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
<style>
*{box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px}
.card-hover{transition:transform .18s,box-shadow .18s}
.card-hover:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.12)}
.dark .card-hover:hover{box-shadow:0 10px 28px rgba(0,0,0,.4)}
.tab-active{border-bottom:2px solid #3b82f6;color:#3b82f6;font-weight:600}
.tab-inactive{color:#6b7280;border-bottom:2px solid transparent}
.dark .tab-inactive{color:#94a3b8}
[contenteditable]:focus{outline:2px solid #3b82f6;outline-offset:1px;border-radius:3px}
#toast{transition:opacity .3s;opacity:0;pointer-events:none}
#toast.show{opacity:1}
.mermaid svg{max-width:100%;height:auto;transform-origin:0 0;transition:transform 0.2s ease;}
.spec-pill{transition:all .18s}
.spec-pill.active{box-shadow:0 0 0 2px #3b82f6,0 0 0 4px #fff}
.dark .spec-pill.active{box-shadow:0 0 0 2px #3b82f6,0 0 0 4px #0f172a}
.field-label{display:block;font-size:.7rem;font-weight:600;color:#6b7280;margin-bottom:.25rem}
.dark .field-label{color:#94a3b8}
.field-input{width:100%;border-radius:.5rem;border:1px solid #e5e7eb;background:#f9fafb;padding:.5rem .75rem;font-size:.875rem;transition:box-shadow .15s}
.field-input:focus{outline:none;box-shadow:0 0 0 2px #3b82f6}
.dark .field-input{border-color:#475569;background:#1e293b;color:#e2e8f0}
.copy-btn { opacity: 0; transition: opacity 0.2s; }
.group:hover .copy-btn { opacity: 1; }
.mm-container { overflow: hidden; position: relative; width: 100%; cursor: grab; }
.mm-container:active { cursor: grabbing; }
.score-block { transition: all 0.2s ease; }
details > summary { list-style: none; }
details > summary::-webkit-details-marker { display: none; }
</style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-800 dark:text-slate-200 min-h-screen">

<nav class="sticky top-0 z-40 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14 gap-3">
    <div class="flex items-center gap-2 flex-shrink-0">
      <span class="text-xl">🩺</span>
      <span class="font-bold text-lg text-blue-700 dark:text-blue-300">PhácĐồ<span class="text-blue-500">MD</span></span>
    </div>
    <div class="flex items-center gap-2 flex-1 max-w-lg">
      <div class="relative flex-1">
        <span class="absolute left-2.5 top-2 text-gray-400 text-xs">🔍</span>
        <input id="searchInput" type="text" placeholder="Tìm tên bệnh, ICD…"
          class="pl-7 pr-3 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-400 w-full"/>
      </div>
      
      <input type="file" id="fileImport" accept=".json" class="hidden" />
      <button id="btnImport" title="Nhập từ file JSON" class="flex items-center justify-center bg-gray-100 hover:bg-gray-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-700 dark:text-gray-300 text-sm px-2.5 py-1.5 rounded-lg transition flex-shrink-0">
        <span class="text-base leading-none">📥</span>
      </button>

      <button id="btnAdd" class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm px-3 py-1.5 rounded-lg transition flex-shrink-0">
        <span class="text-base leading-none">＋</span><span class="hidden sm:inline">Thêm phác đồ</span>
      </button>
      <button id="btnTheme" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition text-lg">🌙</button>
    </div>
  </div>
</nav>

<main id="dashboard" class="max-w-7xl mx-auto px-4 py-6">
  <div id="specRow" class="flex gap-2.5 overflow-x-auto pb-2 mb-6 snap-x snap-mandatory"></div>
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-xl font-bold">Danh sách phác đồ</h1>
      <p id="countLabel" class="text-xs text-gray-500 dark:text-slate-400 mt-0.5"></p>
    </div>
    <button id="btnClearFilter" class="hidden text-xs text-blue-600 dark:text-blue-300 hover:underline flex items-center gap-1">✕ Bỏ lọc</button>
  </div>
  <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-5"></div>
  <div id="emptyState" class="hidden text-center py-20">
    <div class="text-5xl mb-3">📂</div>
    <p class="text-gray-400 text-lg font-medium">Không có phác đồ phù hợp</p>
  </div>
</main>

<div id="detailView" class="hidden max-w-7xl mx-auto px-4 py-6">
  <div class="flex items-center gap-3 mb-5 flex-wrap">
    <button id="btnBack" class="text-sm text-gray-500 hover:text-blue-600 dark:text-slate-400 flex items-center gap-1 transition">← Quay lại</button>
    <span class="h-4 w-px bg-gray-300 dark:bg-slate-600"></span>
    <span id="detailBreadcrumb" class="font-semibold text-blue-600 dark:text-blue-300 text-sm"></span>
    <div class="ml-auto flex gap-2">
      <button id="btnEdit" class="flex items-center gap-1.5 text-sm bg-white/80 dark:bg-slate-800 text-gray-700 dark:text-slate-200 border border-gray-200 dark:border-slate-600 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition">✏️ Chỉnh sửa</button>
      <button id="btnDelete" class="flex items-center gap-1.5 text-sm bg-red-50 dark:bg-red-900/20 text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-100 transition">🗑️ Xóa</button>
    </div>
  </div>
  
  <div id="detailHeader" class="rounded-2xl p-6 mb-4 shadow-sm">
    <div class="flex items-start gap-4">
      <div id="detailIcon" class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 bg-white/30 backdrop-blur-sm shadow"></div>
      <div>
        <h2 id="detailName" class="text-2xl font-bold"></h2>
        <div class="flex flex-wrap gap-2 mt-2">
          <span id="detailICD" class="text-xs font-mono bg-white/30 backdrop-blur-sm px-2.5 py-0.5 rounded-full font-semibold"></span>
          <span id="detailCat" class="text-xs bg-white/20 backdrop-blur-sm px-2.5 py-0.5 rounded-full"></span>
          <span id="detailDate" class="text-xs opacity-70"></span>
        </div>
      </div>
    </div>
  </div>
  
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="flex border-b border-gray-100 dark:border-slate-700 overflow-x-auto">
      <button class="tab-btn tab-active px-4 py-3 text-sm whitespace-nowrap" data-tab="overview">📋 Tổng quát</button>
      <button class="tab-btn tab-inactive px-4 py-3 text-sm whitespace-nowrap" data-tab="diagnosis">🔬 Chẩn đoán</button>
      <button class="tab-btn tab-inactive px-4 py-3 text-sm whitespace-nowrap" data-tab="mindmap">🗺️ Thuật toán</button>
      <button class="tab-btn tab-inactive px-4 py-3 text-sm whitespace-nowrap" data-tab="treatment">🩻 Điều trị</button>
      <button class="tab-btn tab-inactive px-4 py-3 text-sm whitespace-nowrap" data-tab="refs">📚 Tài liệu</button>
    </div>
    <div class="p-5 sm:p-6">
      <div id="tab-overview"></div>
      <div id="tab-diagnosis" class="hidden"></div>
      <div id="tab-mindmap" class="hidden relative">
        <div class="absolute top-2 right-2 z-10 flex gap-1 bg-white dark:bg-slate-800 rounded-lg shadow border border-gray-200 dark:border-slate-700 p-1">
          <button onclick="mmZoom(0.1)" class="p-1.5 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-xs">🔍+</button>
          <button onclick="mmZoom(-0.1)" class="p-1.5 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-xs">🔍-</button>
          <button onclick="mmFit()" class="p-1.5 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-xs">⛶</button>
        </div>
        <div id="mindmap-content" class="mm-container bg-gray-50 dark:bg-slate-900 rounded-xl min-h-[400px]"></div>
      </div>
      <div id="tab-treatment" class="hidden"></div>
      <div id="tab-refs" class="hidden"></div>
    </div>
  </div>
</div>

<div id="modalOverlay" class="hidden fixed inset-0 z-50 flex items-start justify-center overflow-y-auto py-8 px-4" style="background:rgba(0,0,0,.55);backdrop-filter:blur(3px)">
  <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-4xl shadow-2xl border border-gray-100 dark:border-slate-700 my-auto">
    <div class="flex items-center justify-between p-5 border-b border-gray-100 dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-800 z-10 rounded-t-2xl">
      <h2 id="modalTitle" class="font-bold text-lg">Thêm phác đồ mới</h2>
      <button id="btnCloseModal" class="text-xl text-gray-400 hover:text-gray-600 dark:hover:text-white px-2 transition">✕</button>
    </div>
    <div class="p-5 space-y-6 overflow-y-auto" style="max-height:75vh">
      
      <fieldset class="border border-gray-200 dark:border-slate-700 p-4 rounded-xl">
        <legend class="text-sm font-semibold px-2 text-blue-600 dark:text-blue-400">Thông tin cơ bản</legend>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div><label class="field-label">Tên bệnh <span class="text-red-400">*</span></label>
            <input id="f-name" type="text" placeholder="Viêm phổi cộng đồng" class="field-input"/></div>
          <div><label class="field-label">Mã ICD-10</label>
            <input id="f-icd" type="text" placeholder="J18.9" class="field-input"/></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
          <div><label class="field-label">Chuyên khoa</label>
            <select id="f-cat" class="field-input">
              <option>Hô hấp</option><option>Tim mạch</option><option>Tiêu hóa</option>
              <option>Thần kinh</option><option>Nội tiết</option><option>Nhiễm</option>
              <option>Hồi sức</option><option>Thận - Tiết niệu</option>
              <option>Huyết học</option><option>Cơ xương khớp</option><option>Khác</option>
            </select></div>
          <div><label class="field-label">Icon (emoji)</label>
            <input id="f-icon" type="text" placeholder="🫁" maxlength="4" class="field-input"/></div>
        </div>
      </fieldset>

      <fieldset class="border border-gray-200 dark:border-slate-700 p-4 rounded-xl">
        <legend class="text-sm font-semibold px-2 text-blue-600 dark:text-blue-400">Khám & Chẩn đoán</legend>
        <div class="space-y-4">
          <div><label class="field-label">Tổng quan</label>
            <textarea id="f-overview" rows="2" placeholder="Nội dung tổng quan…" class="field-input resize-y"></textarea></div>
          <div><label class="field-label">Dịch tễ học</label>
            <textarea id="f-epidemiology" rows="2" placeholder="Các yếu tố dịch tễ, lây truyền..." class="field-input resize-y"></textarea></div>
          <div><label class="field-label">Cơ chế bệnh sinh</label>
            <textarea id="f-patho" rows="2" placeholder="Cơ chế bệnh sinh…" class="field-input resize-y"></textarea></div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="field-label">Lâm sàng</label>
              <textarea id="f-clinical" rows="3" placeholder="Triệu chứng lâm sàng…" class="field-input resize-y"></textarea></div>
            <div><label class="field-label">Cận lâm sàng</label>
              <textarea id="f-paraclinical" rows="3" placeholder="Xét nghiệm, hình ảnh…" class="field-input resize-y"></textarea></div>
          </div>

          <div><label class="field-label">Tiêu chuẩn chẩn đoán</label>
            <textarea id="f-criteria" rows="2" placeholder="Các tiêu chuẩn chẩn đoán…" class="field-input resize-y"></textarea></div>
          
          <div>
            <div class="flex items-center justify-between mb-2 mt-2">
              <label class="field-label mb-0 text-blue-600 dark:text-blue-400 text-sm">Thang điểm / Đánh giá chẩn đoán</label>
              <button onclick="addScoreBlock()" class="text-xs font-semibold bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded hover:bg-blue-100 transition">＋ Thêm khối chẩn đoán</button>
            </div>
            <div class="text-xs text-gray-500 mb-3 italic">Ghi chú: Bạn có thể nhập nội dung văn bản tự do, nếu không nhập dữ liệu vào bảng, bảng sẽ tự động ẩn đi.</div>
            <div id="scoreBlocksContainer" class="space-y-4"></div>
          </div>

        </div>
      </fieldset>

      <fieldset class="border border-gray-200 dark:border-slate-700 p-4 rounded-xl">
        <legend class="text-sm font-semibold px-2 text-blue-600 dark:text-blue-400">Sơ đồ Thuật toán (Mermaid)</legend>
        <div class="flex gap-2 mb-2">
          <button onclick="insertMmTemplate('algorithm')" class="text-xs bg-gray-100 dark:bg-slate-700 px-2 py-1 rounded hover:bg-gray-200 dark:hover:bg-slate-600">Template Thuật toán</button>
        </div>
        <textarea id="f-mindmap" rows="5" placeholder="flowchart TD..." class="field-input font-mono resize-y"></textarea>
      </fieldset>

      <fieldset class="border border-gray-200 dark:border-slate-700 p-4 rounded-xl bg-blue-50/10 dark:bg-slate-800/20">
        <legend class="text-sm font-semibold px-2 text-blue-600 dark:text-blue-400">Chi tiết Điều trị</legend>
        
        <div class="space-y-6">
          <div>
            <label class="field-label text-blue-700 dark:text-blue-400 text-sm">1. Nguyên tắc điều trị</label>
            <textarea id="f-treat-principles" rows="2" placeholder="Mục tiêu và nguyên tắc cốt lõi..." class="field-input resize-y"></textarea>
          </div>

          <div>
            <label class="field-label text-blue-700 dark:text-blue-400 text-sm">2. Điều trị không dùng thuốc</label>
            <textarea id="f-treat-nonpharma" rows="2" placeholder="Dinh dưỡng, Lối sống, Vận động, Hỗ trợ hô hấp..." class="field-input resize-y"></textarea>
          </div>

          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="field-label mb-0 text-blue-700 dark:text-blue-400 text-sm">3. Điều trị thuốc (Theo vấn đề / Nhóm)</label>
              <button onclick="addDrugGroup()" class="text-xs font-semibold bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 px-2 py-1 rounded hover:bg-emerald-100 transition">＋ Thêm nhóm thuốc mới</button>
            </div>
            <div id="drugGroupsContainer" class="space-y-4"></div>
          </div>

          <div>
            <label class="field-label text-blue-700 dark:text-blue-400 text-sm">4. Thủ thuật / Can thiệp / Phẫu thuật</label>
            <textarea id="f-treat-interv" rows="2" placeholder="Mô tả các thủ thuật can thiệp ngoại khoa hoặc chuyên sâu..." class="field-input resize-y"></textarea>
          </div>

          <div>
            <label class="field-label text-rose-600 dark:text-rose-400 text-sm">5. Biến chứng (Chẩn đoán & Xử trí)</label>
            <textarea id="f-treat-complications" rows="3" placeholder="Các biến chứng thường gặp và hướng xử trí..." class="field-input resize-y"></textarea>
          </div>

          <div>
            <label class="field-label text-purple-600 dark:text-purple-400 text-sm">6. Theo dõi (Monitoring)</label>
            <textarea id="f-treat-monitor" rows="2" placeholder="Theo dõi sinh hiệu, xét nghiệm định kỳ, tiêu chuẩn xuất viện..." class="field-input resize-y"></textarea>
          </div>

        </div>
      </fieldset>

      <fieldset class="border border-gray-200 dark:border-slate-700 p-4 rounded-xl">
        <legend class="text-sm font-semibold px-2 text-blue-600 dark:text-blue-400">Tài liệu tham khảo</legend>
        <button id="btnAddRef" class="text-xs text-blue-600 dark:text-blue-300 hover:underline mb-2">＋ Thêm tài liệu</button>
        <div id="refList" class="space-y-2"></div>
      </fieldset>

    </div>
    <div class="p-5 border-t border-gray-100 dark:border-slate-700 flex justify-end gap-3 rounded-b-2xl bg-gray-50 dark:bg-slate-800/50">
      <button id="btnCancelModal" class="px-4 py-2 text-sm rounded-lg border border-gray-200 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700 transition">Hủy</button>
      <button id="btnSave" class="px-5 py-2 text-sm rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition shadow-sm">💾 Lưu phác đồ</button>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 z-50 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-2">
  <span id="toastMsg"></span>
</div>

<script>
const CATS = {
  'Hô hấp':        { icon:'🫁', color:'blue',    hex:'#3b82f6', mermaid:'#bfdbfe' },
  'Tim mạch':      { icon:'❤️',  color:'rose',    hex:'#f43f5e', mermaid:'#fecdd3' },
  'Tiêu hóa':      { icon:'🫃', color:'amber',   hex:'#f59e0b', mermaid:'#fde68a' },
  'Thần kinh':     { icon:'🧠', color:'purple',  hex:'#a855f7', mermaid:'#e9d5ff' },
  'Nội tiết':      { icon:'🩸', color:'emerald', hex:'#10b981', mermaid:'#a7f3d0' },
  'Nhiễm':         { icon:'🦠', color:'orange',  hex:'#f97316', mermaid:'#fed7aa' },
  'Hồi sức':       { icon:'🚨', color:'red',     hex:'#ef4444', mermaid:'#fecaca' },
  'Thận - Tiết niệu':{ icon:'🫘', color:'cyan', hex:'#06b6d4', mermaid:'#a5f3fc' },
  'Huyết học':     { icon:'🔴', color:'rose',    hex:'#f43f5e', mermaid:'#fecdd3' },
  'Cơ xương khớp': { icon:'🦴', color:'lime',    hex:'#84cc16', mermaid:'#d9f99d' },
  'Khác':          { icon:'📋', color:'gray',    hex:'#6b7280', mermaid:'#e5e7eb' },
};

const GRAD = {
  blue:'linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%)',
  rose:'linear-gradient(135deg,#ffe4e6 0%,#fecdd3 100%)',
  amber:'linear-gradient(135deg,#fef3c7 0%,#fde68a 100%)',
  purple:'linear-gradient(135deg,#f3e8ff 0%,#e9d5ff 100%)',
  emerald:'linear-gradient(135deg,#d1fae5 0%,#a7f3d0 100%)',
  orange:'linear-gradient(135deg,#ffedd5 0%,#fed7aa 100%)',
  red:'linear-gradient(135deg,#fee2e2 0%,#fecaca 100%)',
  cyan:'linear-gradient(135deg,#cffafe 0%,#a5f3fc 100%)',
  lime:'linear-gradient(135deg,#ecfccb 0%,#d9f99d 100%)',
  gray:'linear-gradient(135deg,#f3f4f6 0%,#e5e7eb 100%)',
};
const GRAD_DARK = {
  blue:'linear-gradient(135deg,#1e3a5f 0%,#1e40af 100%)',
  rose:'linear-gradient(135deg,#4c0519 0%,#881337 100%)',
  amber:'linear-gradient(135deg,#451a03 0%,#78350f 100%)',
  purple:'linear-gradient(135deg,#3b0764 0%,#6b21a8 100%)',
  emerald:'linear-gradient(135deg,#022c22 0%,#065f46 100%)',
  orange:'linear-gradient(135deg,#431407 0%,#7c2d12 100%)',
  red:'linear-gradient(135deg,#450a0a 0%,#7f1d1d 100%)',
  cyan:'linear-gradient(135deg,#083344 0%,#164e63 100%)',
  lime:'linear-gradient(135deg,#1a2e05 0%,#365314 100%)',
  gray:'linear-gradient(135deg,#1f2937 0%,#374151 100%)',
};
const SPEC_LIST = ['Hô hấp','Tim mạch','Tiêu hóa','Thần kinh','Nội tiết','Nhiễm','Hồi sức'];

let protocols = [];
let editingId = null;
let currentId = null;
let activeSpec = '';
let dark = false;
let mmScale = 1;
let mmTranslate = {x:0, y:0};

document.getElementById('btnTheme').addEventListener('click', () => {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('btnTheme').textContent = dark ? '☀️' : '🌙';
  if(!document.getElementById('detailView').classList.contains('hidden')){
    const p = protocols.find(x => x.id === currentId);
    if(p) { renderDetail(p); if(!document.getElementById('tab-mindmap').classList.contains('hidden')) renderMindmap(); }
  }
});

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function selectSpec(name) {

  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const arr = protocols.filter(p => {
    const m1 = activeSpec ? p.category === activeSpec : true;
    const m2 = !q || p.name.toLowerCase().includes(q) || (p.icd||'').toLowerCase().includes(q) || (p.overview||'').toLowerCase().includes(q);
    return m1 && m2;
  });
  renderGrid(arr);
  document.getElementById('countLabel').textContent = arr.length + ' phác đồ';
  document.getElementById('btnClearFilter').classList.toggle('hidden', !q && !activeSpec);
  document.getElementById('emptyState').classList.toggle('hidden', arr.length > 0);
}

function renderMindmap() {
  const container = document.getElementById('mindmap-content');
  const tab = document.getElementById('tab-mindmap');
  const code = (tab.dataset.code || '').trim();
  const hex = tab.dataset.color || '#3b82f6';
  const bgHex = tab.dataset.bgcolor || '#bfdbfe';
  
  if (!code) { container.innerHTML = '<p class="text-gray-400 text-sm p-4">Chưa có sơ đồ Mermaid.</p>'; return; }
  
  const id = 'mm_' + Date.now();
  container.innerHTML = `<div class="mermaid flex justify-center items-center h-full w-full" id="${id}">${code}</div>`;
  
  try {
    mermaid.initialize({
      startOnLoad: false, theme: 'base',
      themeVariables: { primaryColor: dark ? '#1e293b' : bgHex, primaryBorderColor: hex, primaryTextColor: dark ? '#f1f5f9' : '#1e293b', lineColor: dark ? '#64748b' : '#94a3b8', background: 'transparent', nodeBorder: hex }
    });
    mermaid.run({ nodes: [document.getElementById(id)] }).then(() => setupPanZoom(document.getElementById(id).querySelector('svg')));
  } catch(e) { container.innerHTML = `<div class="bg-red-50 dark:bg-red-900/20 rounded-xl p-4 text-red-500 text-sm font-mono m-4">${e.message}</div>`; }
}

let isDragging = false, startX, startY;
function setupPanZoom(svg) {
  if(!svg) return;
  mmScale = 1; mmTranslate = {x:0, y:0}; applyMmTransform(svg);
  const container = document.getElementById('mindmap-content');
  container.onmousedown = (e) => { isDragging = true; startX = e.clientX - mmTranslate.x; startY = e.clientY - mmTranslate.y; };
  container.onmousemove = (e) => { if(!isDragging) return; mmTranslate.x = e.clientX - startX; mmTranslate.y = e.clientY - startY; applyMmTransform(svg); };
  container.onmouseup = () => isDragging = false;
  container.onmouseleave = () => isDragging = false;
  container.onwheel = (e) => { e.preventDefault(); mmZoom(e.deltaY > 0 ? -0.1 : 0.1); };
}
function applyMmTransform(svg) { if(svg) svg.style.transform = `translate(${mmTranslate.x}px, ${mmTranslate.y}px) scale(${mmScale})`; }
function mmZoom(delta) {
  const svg = document.querySelector('#mindmap-content svg'); if(!svg) return;
  mmScale += delta; if(mmScale < 0.2) mmScale = 0.2; if(mmScale > 3) mmScale = 3; applyMmTransform(svg);
}
function mmFit() { mmScale = 1; mmTranslate = {x:0, y:0}; applyMmTransform(document.querySelector('#mindmap-content svg')); }

document.getElementById('fileImport').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const data = JSON.parse(event.target.result);
      editingId = null; 
      document.getElementById('modalTitle').textContent = 'Thêm phác đồ (Từ file)';
      clearForm(); 
      fillForm(data); 
      openModal(); 
      toast('Đã tải dữ liệu!');
    } catch(err) { 
      console.error(err);
      alert('Lỗi chi tiết: ' + err.message + '\\n\\n*Gợi ý: Nếu có chữ "null", tức là trình duyệt đang chạy bản cũ chưa được cập nhật, hãy xoá cache trình duyệt (Ctrl+F5)!'); 
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

  if(data.rows && data.rows.length > 0) data.rows.forEach(r => _createScoreRowEl(tbody, r));
}

function addScoreRowToBlock(blockId) {
    const block = document.querySelector(`[data-block-id="${blockId}"]`);
    if(block) _createScoreRowEl(block.querySelector('.sb-tbody'), {});
}

function _createScoreRowEl(tbody, d = {}) {
  const tr = document.createElement('tr');
  tr.className = `border-t border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800/50`;
  const fields = ['criteria','details','points'];
  tr.innerHTML = fields.map(f => `<td class="px-2 py-1.5"><div contenteditable="true" data-f="${f}" class="text-xs text-gray-700 dark:text-slate-300 min-h-[18px] outline-none focus:bg-gray-100 dark:focus:bg-slate-700 p-1 rounded">${d[f]||''}</div></td>`).join('') +
  `<td class="px-1 text-center"><button type="button" class="del-srow text-red-400 hover:text-red-600 font-bold">×</button></td>`;
  tr.querySelector('.del-srow').addEventListener('click', () => tr.remove());
  tbody.appendChild(tr);
}

function getScoreTables() {
  return Array.from(document.querySelectorAll('.score-block')).map(block => {
      const name = block.querySelector('.f-sb-name').value.trim();
      const desc = block.querySelector('.f-sb-desc').value.trim();
      const rows = Array.from(block.querySelectorAll('.sb-tbody tr')).map(tr => {
          const obj = {}; tr.querySelectorAll('[data-f]').forEach(el => obj[el.dataset.f] = el.textContent.trim()); return obj;
      }).filter(d => d.criteria || d.details || d.points);
      return { name, desc, rows };
  }).filter(t => t.name || t.desc || t.rows.length > 0);
}

// ── DRUG GROUPS ──
function addDrugGroup(data = {}) {
  const container = document.getElementById('drugGroupsContainer');
  const groupId = 'dg_' + Date.now() + Math.floor(Math.random() * 100);
  
  const div = document.createElement('div');
  div.className = 'border border-emerald-200 dark:border-emerald-900/50 p-3 rounded-lg bg-emerald-50/30 dark:bg-slate-800/50';
  div.dataset.groupId = groupId;
  div.innerHTML = `
    <div class="flex items-center justify-between mb-3 border-b border-emerald-100 dark:border-emerald-900 pb-2">
      <input type="text" placeholder="Tên vấn đề / Nhóm thuốc (VD: Kiểm soát huyết áp, Kháng sinh)..." value="${data.name||''}" class="dg-name field-input font-semibold text-emerald-700 dark:text-emerald-400 border-none shadow-sm !py-1.5 w-full mr-2"/>
      <button type="button" class="text-red-400 hover:text-red-600 text-xl px-1" onclick="this.closest('[data-group-id]').remove()">✕</button>
    </div>
    <div class="flex justify-end mb-2">
      <button type="button" onclick="addDrugToGroup('${groupId}')" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">＋ Thêm thuốc</button>
    </div>
    <div class="overflow-x-auto rounded border border-gray-200 dark:border-slate-600">
      <table class="min-w-full text-xs">
        <thead class="bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300">
          <tr><th class="px-2 py-2 text-left">Tên thuốc</th><th class="px-2 py-2 text-left">Liều dùng</th>
          <th class="px-2 py-2 text-left">CCĐ / Thận trọng</th><th class="px-2 py-2 text-left">Tác dụng phụ</th>
          <th class="px-2 py-2 text-left">Ghi chú</th><th class="w-6"></th></tr>
        </thead>
        <tbody class="dg-tbody"></tbody>
      </table>
    </div>
  `;
  container.appendChild(div);
  if(data.drugs && data.drugs.length > 0) data.drugs.forEach(d => _createDrugRow(div.querySelector('.dg-tbody'), d));
  else _createDrugRow(div.querySelector('.dg-tbody'), {});
}

function addDrugToGroup(groupId) {
    const group = document.querySelector(`[data-group-id="${groupId}"]`);
    if(group) _createDrugRow(group.querySelector('.dg-tbody'), {});
}

function _createDrugRow(tbody, d = {}) {
  const tr = document.createElement('tr');
  tr.className = 'border-t border-gray-100 dark:border-slate-700 bg-white dark:bg-slate-800';
  const fields = ['name','dose','contraindication','sideEffect','note'];
  tr.innerHTML = fields.map(f => `<td class="px-2 py-1.5"><div contenteditable="true" data-f="${f}" class="text-xs text-gray-700 dark:text-slate-300 min-h-[18px] outline-none focus:bg-gray-50 dark:focus:bg-slate-700 p-1 rounded">${d[f]||''}</div></td>`).join('') +
  `<td class="px-1 text-center"><button type="button" class="text-red-400 hover:text-red-600 font-bold" onclick="this.closest('tr').remove()">×</button></td>`;
  tbody.appendChild(tr);
}

function getDrugGroups() {
  return Array.from(document.querySelectorAll('#drugGroupsContainer > div')).map(group => {
      const name = group.querySelector('.dg-name').value.trim();
      const drugs = Array.from(group.querySelectorAll('.dg-tbody tr')).map(tr => {
          const obj = {}; tr.querySelectorAll('[data-f]').forEach(el => obj[el.dataset.f] = el.textContent.trim()); return obj;
      }).filter(d => d.name);
      return { name, drugs };
  }).filter(g => g.name || g.drugs.length > 0);
}

function addRefRow(r = {}) {
  const div = document.createElement('div');
  div.className = 'flex gap-2 items-start';
  div.innerHTML = `<div class="flex-1 space-y-1"><input type="text" placeholder="Tên tài liệu..." value="${r.title||''}" class="f-ref-title field-input py-1 text-xs"/><input type="text" placeholder="URL (nếu có)..." value="${r.url||''}" class="f-ref-url field-input py-1 text-xs text-blue-600"/></div><button class="del-ref text-red-400 hover:text-red-600 text-lg p-1">×</button>`;
  div.querySelector('.del-ref').addEventListener('click', () => div.remove());
  document.getElementById('refList').appendChild(div);
}
function getRefs() {
  return Array.from(document.querySelectorAll('#refList > div')).map(div => ({ title: div.querySelector('.f-ref-title').value.trim(), url: div.querySelector('.f-ref-url').value.trim() })).filter(r => r.title || r.url);
}

document.getElementById('btnBack').addEventListener('click', closeDetail);
document.getElementById('btnCloseModal').addEventListener('click', closeModal);
document.getElementById('btnCancelModal').addEventListener('click', closeModal);

document.getElementById('btnAdd').addEventListener('click', () => {
  editingId = null; document.getElementById('modalTitle').textContent = 'Thêm phác đồ mới';
  clearForm(); addScoreBlock(); addDrugGroup(); openModal();
});

document.getElementById('btnEdit').addEventListener('click', () => {
  if (!currentId) return; const p = protocols.find(x => x.id === currentId); if (!p) return;
  editingId = currentId; document.getElementById('modalTitle').textContent = 'Chỉnh sửa phác đồ';
  clearForm(); fillForm(p); openModal();
});

document.getElementById('btnDelete').addEventListener('click', async () => {
  if (!currentId || !confirm('Bạn có chắc chắn muốn xóa phác đồ này?')) return;
  const { error } = await db.from('protocols').delete().eq('id', currentId);
  if (error) { alert('Lỗi khi xóa: ' + error.message); return; }
  protocols = protocols.filter(x => x.id !== currentId);
  closeDetail(); applyFilters(); toast('🗑️ Đã xóa phác đồ');
});

document.getElementById('btnAddRef').addEventListener('click', () => addRefRow());

document.getElementById('btnSave').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return alert('Vui lòng nhập tên bệnh');

  const p = {
    id: editingId || 'p_' + Date.now(),
    name,
    icd: document.getElementById('f-icd').value.trim(),
    icon: document.getElementById('f-icon').value.trim() || '📝',
    category: document.getElementById('f-cat').value,
    overview: document.getElementById('f-overview').value.trim(),
    epidemiology: document.getElementById('f-epidemiology').value.trim(),
    patho: document.getElementById('f-patho').value.trim(),
    criteria: document.getElementById('f-criteria').value.trim(),
    scoreTables: getScoreTables(),
    clinical: document.getElementById('f-clinical').value.trim(),
    paraclinical: document.getElementById('f-paraclinical').value.trim(),
    mindmap: document.getElementById('f-mindmap').value.trim(),
    treatment: {
      principles: document.getElementById('f-treat-principles').value.trim(),
      nonpharma: document.getElementById('f-treat-nonpharma').value.trim(),
      drugGroups: getDrugGroups(),
      intervention: document.getElementById('f-treat-interv').value.trim(),
      complications: document.getElementById('f-treat-complications').value.trim(),
      monitoring: document.getElementById('f-treat-monitor').value.trim(),
    },
    refs: getRefs(),
    updated_at: new Date().toISOString(),
  };

  const { error } = await db.from('protocols').upsert(p);
  if (error) { alert('Lỗi khi lưu: ' + error.message); return; }

  if (editingId) {
    const idx = protocols.findIndex(x => x.id === editingId);
    if (idx >= 0) protocols[idx] = p; else protocols.unshift(p);
  } else { protocols.unshift(p); }

  closeModal(); applyFilters(); toast('✅ Đã lưu phác đồ thành công');
  if (currentId === p.id) renderDetail(p);
});

mermaid.initialize({ startOnLoad: false });
loadStored();
</script>
</body>
</html>
