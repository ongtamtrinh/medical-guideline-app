<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicalGuide - Phác đồ Viêm phổi Cộng đồng (CAP)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        * { box-sizing: border-box; }
        /* Ẩn thanh cuộn của sidebar nhưng vẫn cho phép cuộn */
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #8883; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        /* ─── THEME ─── */
        const DARK = {
          bg:"#0f1117",card:"#1a1d27",border:"#2a2d3e",text:"#e2e8f0",
          muted:"#94a3b8",accent:"#3b82f6",danger:"#ef4444",warn:"#f59e0b",
          success:"#10b981",surface:"#141720",input:"#1e2130",purple:"#a78bfa"
        };
        const LIGHT = {
          bg:"#f0f4f8",card:"#ffffff",border:"#e2e8f0",text:"#1e293b",
          muted:"#64748b",accent:"#2563eb",danger:"#dc2626",warn:"#d97706",
          success:"#059669",surface:"#f8fafc",input:"#f1f5f9",purple:"#7c3aed"
        };

        /* ─── DATA ─── */
        const DRUGS=[
          {id:"amoxi",name:"Amoxicillin-Clavulanate",dosePerKg:45,unit:"mg/kg/ngày",maxDose:4000,freq:"chia 2 lần/ngày",route:"PO",dilution:"Uống trực tiếp với nước",rate:"Uống cùng bữa ăn để giảm kích ứng dạ dày"},
          {id:"azithro",name:"Azithromycin",dosePerKg:10,unit:"mg/kg/ngày",maxDose:500,freq:"1 lần/ngày × 5 ngày",route:"PO/IV",dilution:"500mg pha trong 250ml NaCl 0.9%",rate:"Truyền TM trong 60 phút"},
          {id:"ceftri",name:"Ceftriaxone",dosePerKg:50,unit:"mg/kg/ngày",maxDose:2000,freq:"1–2 lần/ngày",route:"IV",dilution:"1g pha trong 100ml NaCl 0.9%",rate:"Truyền TM trong 30 phút"},
        ];

        const REFS=[
          {id:1,authors:"Metlay JP, Waterer GW, Long AC, et al.",year:2019,title:"Diagnosis and Treatment of Adults with Community-acquired Pneumonia.",journal:"Am J Respir Crit Care Med",vol:"200(7)",pages:"e45–e67",doi:"10.1164/rccm.201908-1581ST"},
          {id:2,authors:"Mandell LA, Wunderink RG, Anzueto A, et al.",year:2007,title:"IDSA/ATS Consensus Guidelines on the Management of CAP in Adults.",journal:"Clin Infect Dis",vol:"44(Suppl 2)",pages:"S27–72",doi:"10.1086/511159"},
          {id:3,authors:"Bộ Y tế Việt Nam",year:2015,title:"Hướng dẫn chẩn đoán và điều trị viêm phổi mắc phải cộng đồng ở người lớn.",journal:"Quyết định số 4815/QĐ-BYT",vol:"",pages:"",doi:""},
          {id:4,authors:"Lim WS, van der Eerden MM, Laing R, et al.",year:2003,title:"Defining community acquired pneumonia severity on presentation to hospital: an international derivation and validation study.",journal:"Thorax",vol:"58(5)",pages:"377–382",doi:"10.1136/thorax.58.5.377"},
        ];

        const SECTIONS=[
          {id:"diag",title:"1. Chẩn đoán & Phân loại mức độ"},
          {id:"redflags",title:"2. Dấu hiệu nguy hiểm"},
          {id:"flowchart",title:"3. Sơ đồ xử trí"},
          {id:"drugs",title:"4. Phác đồ kháng sinh"},
          {id:"nursing",title:"5. Hướng dẫn điều dưỡng"},
          {id:"monitoring",title:"6. Theo dõi & Tiêu chí xuất viện"},
          {id:"refs",title:"7. Tài liệu tham khảo"},
        ];

        /* ─── COMPONENTS ─── */
        function Badge({color,children}){
          return <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;
        }

        function Toggle({value,onChange,c}){
          return(
            <div onClick={()=>onChange(!value)} style={{width:38,height:20,borderRadius:99,background:value?c.success:c.border,cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
              <div style={{position:"absolute",top:2,left:value?20:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
            </div>
          );
        }

        function DosageCalc({drug,c}){
          const[weight,setWeight]=useState(60);
          const raw=drug.dosePerKg*weight;
          const dose=Math.min(raw,drug.maxDose).toFixed(0);
          const capped=raw>drug.maxDose;
          return(
            <div style={{background:c.accent+"12",border:`1px solid ${c.accent}33`,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontWeight:700,color:c.accent,fontSize:13,minWidth:180}}>{drug.name}</span>
                <Badge color={drug.route==="IV"?c.danger:c.success}>{drug.route}</Badge>
                <div style={{display:"flex",alignItems:"center",gap:5,marginLeft:"auto"}}>
                  <label style={{color:c.muted,fontSize:12}}>Cân nặng:</label>
                  <input type="number" value={weight} min={1} max={200} onChange={e=>setWeight(+e.target.value)}
                    style={{width:56,padding:"2px 6px",borderRadius:5,border:`1px solid ${c.border}`,background:c.input,color:c.text,fontSize:13,textAlign:"center"}}/>
                  <span style={{color:c.muted,fontSize:12}}>kg</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{color:c.muted,fontSize:12}}>→</span>
                  <span style={{color:c.accent,fontWeight:700,fontSize:15}}>{dose} mg</span>
                  <span style={{color:c.muted,fontSize:12}}>{drug.freq}</span>
                  {capped&&<Badge color={c.warn}>Tối đa {drug.maxDose}mg</Badge>}
                </div>
              </div>
            </div>
          );
        }

        function ScoreCalc({c}){
          const items=[
            {id:"confusion",label:"Lú lẫn (Confusion)"},
            {id:"urea",label:"Ure máu > 7 mmol/L"},
            {id:"rr",label:"Nhịp thở ≥ 30 lần/phút"},
            {id:"bp",label:"HA tâm thu < 90 hoặc tâm trương ≤ 60"},
            {id:"age",label:"Tuổi ≥ 65"},
          ];
          const[scores,setScores]=useState({});
          const total=Object.values(scores).filter(Boolean).length;
          const getSeverity=()=>{
            if(total<=1)return{label:"Nhẹ — Điều trị ngoại trú",color:c.success,action:"Kháng sinh uống, tái khám sau 48h"};
            if(total===2)return{label:"Trung bình — Nhập viện nội khoa",color:c.warn,action:"Kháng sinh IV, theo dõi sát SpO₂"};
            return{label:"Nặng — Cân nhắc ICU",color:c.danger,action:"Hội chẩn hồi sức, kháng sinh phổ rộng"};
          };
          const sev=getSeverity();
          return(
            <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:9,padding:14,margin:"12px 0"}}>
              <div style={{fontWeight:700,color:c.text,fontSize:13,marginBottom:10}}>🧮 CURB-65 Score (Đánh giá mức độ nặng)</div>
              {items.map(it=>(
                <label key={it.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,cursor:"pointer"}}>
                  <input type="checkbox" checked={!!scores[it.id]} onChange={e=>setScores({...scores,[it.id]:e.target.checked})}
                    style={{width:15,height:15,accentColor:c.accent}}/>
                  <span style={{color:c.text,fontSize:13}}>{it.label}</span>
                </label>
              ))}
              <div style={{marginTop:12,padding:"10px 14px",background:sev.color+"18",border:`2px solid ${sev.color}`,borderRadius:8}}>
                <div style={{fontWeight:700,color:sev.color,fontSize:13}}>Điểm CURB-65: {total}/5 — {sev.label}</div>
                <div style={{color:c.muted,fontSize:12,marginTop:3}}>→ {sev.action}</div>
              </div>
              <div style={{color:c.muted,fontSize:11,marginTop:6}}>Nguồn: Lim et al., Thorax 2003 [4]</div>
            </div>
          );
        }

        /* ─── MAIN APP ─── */
        function VPCDGuideline() {
          const[dark,setDark]=useState(true);
          const c=dark?DARK:LIGHT;
          const[nursing,setNursing]=useState(false);
          const[active,setActive]=useState("diag");
          const[sidebar,setSidebar]=useState(true);

          const scrollTo=id=>{
            setActive(id);
            const el = document.getElementById(id);
            if (el) {
                const offset = 60;
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = el.getBoundingClientRect().top;
                const elementPosition = elementRect - bodyRect;
                const offsetPosition = elementPosition - offset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            }
          };

          return(
            <div style={{minHeight:"100vh",background:c.bg,color:c.text,fontFamily:"system-ui,sans-serif",fontSize:14}}>
              {/* Topbar */}
              <div style={{background:c.card,borderBottom:`1px solid ${c.border}`,padding:"10px 16px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>setSidebar(!sidebar)} style={{background:"none",border:"none",color:c.muted,cursor:"pointer",fontSize:18}}>☰</button>
                <span style={{fontWeight:700,color:c.accent,fontSize:15}}>🏥 ClinicalGuide</span>
                <span style={{color:c.border}}>|</span>
                <span style={{fontWeight:600,color:c.text,fontSize:13,flex:1}}>Viêm phổi Cộng đồng (CAP)</span>
                <Badge color={c.accent}>v2.1</Badge>
                <Badge color={c.success}>Nội hô hấp</Badge>
                <Badge color={c.warn}>ICD-10: J18.9</Badge>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:c.muted}}>Điều dưỡng</span>
                  <Toggle value={nursing} onChange={setNursing} c={c}/>
                </div>
                <button onClick={()=>setDark(!dark)} style={{background:c.surface,border:`1px solid ${c.border}`,color:c.text,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,marginLeft:8}}>
                  {dark?"☀️ Sáng":"🌙 Tối"}
                </button>
              </div>

              <div style={{display:"flex",maxWidth:1100,margin:"0 auto"}}>
                {/* Sidebar */}
                {sidebar&&(
                  <div className="sidebar-scroll" style={{width:210,minWidth:210,position:"sticky",top:49,height:"calc(100vh - 49px)",overflowY:"auto",background:c.card,borderRight:`1px solid ${c.border}`,padding:"14px 10px",boxSizing:"border-box"}}>
                    <div style={{fontSize:11,color:c.muted,fontWeight:700,letterSpacing:1,marginBottom:10}}>MỤC LỤC</div>
                    {SECTIONS.map(s=>(
                      <button key={s.id} onClick={()=>scrollTo(s.id)} style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",marginBottom:2,background:active===s.id?c.accent+"22":"transparent",border:"none",borderRadius:6,cursor:"pointer",color:active===s.id?c.accent:c.muted,fontSize:12,fontWeight:active===s.id?600:400,borderLeft:`3px solid ${active===s.id?c.accent:"transparent"}`}}>
                        {s.title}
                      </button>
                    ))}
                  </div>
                )}

                {/* Content */}
                <div style={{flex:1,padding:"16px 20px",boxSizing:"border-box",overflowX:"hidden"}}>

                  {/* Header */}
                  <div style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:14}}>
                    <h1 style={{margin:"0 0 6px",fontSize:20,fontWeight:700,color:c.text}}>Phác đồ Chẩn đoán và Điều trị Viêm phổi Mắc phải Cộng đồng (CAP)</h1>
                    <div style={{color:c.muted,fontSize:12,marginBottom:8}}>Tác giả: ThS. Lê Quang Hưng • TS. Phạm Thị Lan • Cập nhật: 2024-09-10</div>
                    <div style={{fontSize:12,color:c.muted,fontStyle:"italic"}}>Dựa trên hướng dẫn ATS/IDSA 2019 [1,2] và Quyết định 4815/QĐ-BYT 2015 [3]</div>
                  </div>

                  {/* Section 1 — Chẩn đoán */}
                  <div id="diag" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 10px"}}>1. Chẩn đoán & Phân loại mức độ nặng</h2>
                    <p style={{color:c.muted,fontSize:13.5,lineHeight:1.7,margin:"0 0 10px"}}>
                      CAP được chẩn đoán khi có <b style={{color:c.text}}>triệu chứng hô hấp cấp</b> (ho, khó thở, đau ngực kiểu màng phổi) kèm thâm nhiễm mới trên X-quang phổi, xảy ra ngoài bệnh viện hoặc trong vòng 48 giờ đầu nhập viện.
                    </p>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                      {[
                        {label:"Sốt > 38.5°C hoặc hạ thân nhiệt",color:c.danger},
                        {label:"Ho khan hoặc khạc đờm",color:c.warn},
                        {label:"SpO₂ < 94% khi thở khí phòng",color:c.danger},
                        {label:"Ran ở phổi khi nghe",color:c.accent},
                        {label:"X-quang: Thâm nhiễm mới",color:c.accent},
                      ].map((t,i)=>(
                        <div key={i} style={{padding:"6px 12px",background:t.color+"15",borderRadius:7,border:`1px solid ${t.color}33`,fontSize:12,color:t.color,fontWeight:500}}>{t.label}</div>
                      ))}
                    </div>
                    <ScoreCalc c={c}/>
                  </div>

                  {/* Section 2 — Red Flags */}
                  <div id="redflags" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 10px"}}>2. Dấu hiệu nguy hiểm — Tiêu chí CAP nặng</h2>
                    <div style={{background:c.danger+"15",border:`2px solid ${c.danger}`,borderRadius:10,padding:14,marginBottom:10}}>
                      <div style={{color:c.danger,fontWeight:700,fontSize:14,marginBottom:8}}>⚠️ TIÊU CHÍ LỚN — CẦN ICU NGAY</div>
                      {["Suy hô hấp cần đặt NKQ và thở máy","Sốc nhiễm khuẩn cần dùng vận mạch"].map((f,i)=>(
                        <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                          <span style={{color:c.danger,fontWeight:700}}>✕</span>
                          <span style={{color:c.text,fontSize:13.5}}>{f}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{background:c.warn+"15",border:`1.5px solid ${c.warn}`,borderRadius:10,padding:14}}>
                      <div style={{color:c.warn,fontWeight:700,fontSize:13,marginBottom:8}}>⚡ TIÊU CHÍ NHỎ — ≥ 3 tiêu chí → Cân nhắc ICU</div>
                      {[
                        "Nhịp thở ≥ 30 lần/phút","PaO₂/FiO₂ < 250 mmHg","Thâm nhiễm đa thùy trên X-quang",
                        "Lú lẫn/mất định hướng","Ure máu ≥ 20 mg/dL (7.1 mmol/L)",
                        "Bạch cầu < 4.000/mm³","Tiểu cầu < 100.000/mm³",
                        "Thân nhiệt < 36°C","HA tâm thu < 90 mmHg cần bù dịch tích cực"
                      ].map((f,i)=>(
                        <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                          <span style={{color:c.warn,fontWeight:700}}>!</span>
                          <span style={{color:c.text,fontSize:13}}>{f}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Section 3 — Flowchart */}
                  <div id="flowchart" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 12px"}}>3. Sơ đồ xử trí CAP</h2>
                    {[
                      {label:"Nghi ngờ CAP",note:"Triệu chứng hô hấp + X-quang thâm nhiễm",color:c.accent,shape:"round"},
                      {label:"Tính điểm CURB-65",note:"Đánh giá mức độ nặng",color:c.purple,shape:"square"},
                      {label:"CURB-65 = 0–1",note:"Ngoại trú: Amoxicillin-Clavulanate PO 5–7 ngày",color:c.success,shape:"square"},
                      {label:"CURB-65 = 2",note:"Nhập viện nội khoa: Cephalosporin IV + Azithromycin",color:c.warn,shape:"square"},
                      {label:"CURB-65 ≥ 3 hoặc Tiêu chí lớn",note:"ICU: Carbapenem + Azithromycin hoặc Fluoroquinolon",color:c.danger,shape:"square"},
                      {label:"Theo dõi 48–72h, đánh giá đáp ứng",note:"Nếu không đáp ứng: Cấy đờm, BAL, đổi kháng sinh",color:c.accent,shape:"round"},
                    ].map((s,i,arr)=>(
                      <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                        <div style={{width:"100%",maxWidth:420,padding:"9px 16px",background:s.color+"18",border:`2px solid ${s.color}`,borderRadius:s.shape==="round"?40:9,textAlign:"center"}}>
                          <div style={{fontWeight:700,color:s.color,fontSize:13}}>{s.label}</div>
                          <div style={{color:c.muted,fontSize:11,marginTop:2}}>{s.note}</div>
                        </div>
                        {i<arr.length-1&&<div style={{height:16,width:2,background:c.border}}/>}
                      </div>
                    ))}
                  </div>

                  {/* Section 4 — Drugs */}
                  <div id="drugs" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 6px"}}>4. Phác đồ kháng sinh — Tính liều theo cân nặng</h2>
                    <div style={{color:c.muted,fontSize:12,marginBottom:12}}>Nhập cân nặng bệnh nhân để tính liều tự động (giới hạn liều người lớn tối đa)</div>
                    {DRUGS.map(d=><DosageCalc key={d.id} drug={d} c={c}/>)}
                    <div style={{marginTop:10,padding:"8px 12px",background:c.surface,borderRadius:7,fontSize:12}}>
                      <b style={{color:c.text}}>Lưu ý dị ứng:</b> <span style={{color:c.muted}}>Nếu dị ứng Penicillin nhẹ → dùng Cephalosporin thế hệ 3. Dị ứng nặng (sốc phản vệ) → dùng Azithromycin đơn trị hoặc Fluoroquinolon hô hấp.</span>
                    </div>
                  </div>

                  {/* Section 5 — Nursing */}
                  {nursing&&(
                    <div id="nursing" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                      <h2 style={{fontSize:15,fontWeight:700,color:c.success,margin:"0 0 12px"}}>🩺 5. Hướng dẫn Điều dưỡng</h2>
                      {DRUGS.filter(d=>d.route.includes("IV")).map(d=>(
                        <div key={d.id} style={{marginBottom:10,padding:"10px 14px",background:c.success+"10",border:`1px solid ${c.success}33`,borderRadius:8}}>
                          <div style={{fontWeight:700,color:c.text,fontSize:13,marginBottom:4}}>{d.name} — {d.route}</div>
                          <div style={{fontSize:12,color:c.muted}}><b style={{color:c.success}}>Pha thuốc:</b> {d.dilution}</div>
                          <div style={{fontSize:12,color:c.muted}}><b style={{color:c.success}}>Tốc độ truyền:</b> {d.rate}</div>
                        </div>
                      ))}
                      <div style={{padding:"10px 14px",background:c.warn+"10",border:`1px solid ${c.warn}33`,borderRadius:8}}>
                        <div style={{fontWeight:600,color:c.warn,fontSize:13,marginBottom:6}}>📋 Theo dõi điều dưỡng mỗi 4h</div>
                        {["Nhiệt độ, mạch, huyết áp, nhịp thở, SpO₂","Lượng nước tiểu (ghi chép I/O)","Đánh giá tính chất đờm (màu sắc, số lượng)","Kiểm tra vị trí catheter IV, dấu hiệu viêm"].map((t,i)=>(
                          <div key={i} style={{display:"flex",gap:6,marginBottom:4}}>
                            <span style={{color:c.warn}}>•</span>
                            <span style={{color:c.muted,fontSize:12}}>{t}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Section 6 — Monitoring */}
                  <div id="monitoring" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 10px"}}>6. Theo dõi & Tiêu chí xuất viện</h2>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:10}}>
                      <div style={{background:c.success+"10",border:`1px solid ${c.success}33`,borderRadius:8,padding:12}}>
                        <div style={{fontWeight:700,color:c.success,fontSize:13,marginBottom:8}}>✅ Đủ điều kiện xuất viện khi</div>
                        {["Nhiệt độ < 37.8°C trong 24h","Nhịp tim < 100 lần/phút","Nhịp thở < 24 lần/phút","SpO₂ ≥ 90% khi thở khí phòng","Bệnh nhân ăn uống được bình thường","Tri giác bình thường"].map((t,i)=>(
                          <div key={i} style={{fontSize:12,color:c.muted,marginBottom:3}}>✓ {t}</div>
                        ))}
                      </div>
                      <div style={{background:c.accent+"10",border:`1px solid ${c.accent}33`,borderRadius:8,padding:12}}>
                        <div style={{fontWeight:700,color:c.accent,fontSize:13,marginBottom:8}}>📅 Lịch tái khám</div>
                        <div style={{fontSize:12,color:c.muted,lineHeight:1.8}}>
                          <div><b style={{color:c.text}}>48–72h:</b> Đánh giá đáp ứng kháng sinh</div>
                          <div><b style={{color:c.text}}>7–10 ngày:</b> X-quang phổi kiểm tra</div>
                          <div><b style={{color:c.text}}>6 tuần:</b> X-quang phổi xác nhận hết thâm nhiễm</div>
                          <div style={{marginTop:8,padding:"6px 8px",background:c.warn+"15",borderRadius:5,fontSize:11,color:c.warn}}>
                            ⚠️ BN &gt; 50 tuổi hoặc hút thuốc lá: cần nội soi phế quản loại trừ ác tính nếu không hết sau 6 tuần
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Section 7 — References */}
                  <div id="refs" style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:16,marginBottom:12}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:c.text,margin:"0 0 12px"}}>7. Tài liệu tham khảo</h2>
                    {REFS.map(r=>(
                      <div key={r.id} style={{display:"flex",gap:10,marginBottom:12,paddingBottom:12,borderBottom:`0.5px solid ${c.border}`}}>
                        <span style={{color:c.accent,fontWeight:700,fontSize:13,minWidth:20}}>[{r.id}]</span>
                        <div>
                          <div style={{fontSize:12.5,color:c.text,lineHeight:1.6}}>
                            {r.authors} ({r.year}). <i>{r.title}</i> <span style={{color:c.muted}}>{r.journal}{r.vol?`, ${r.vol}`:""}. {r.pages}</span>
                          </div>
                          {r.doi&&<div style={{fontSize:11,color:c.accent,marginTop:2, wordBreak:"break-all"}}>DOI: {r.doi}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VPCDGuideline />);
    </script>
</body>
</html>
